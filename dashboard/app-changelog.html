<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>App 投放 - 变更日志 | Google Ads Change History</title>
  <link rel="stylesheet" href="css/app-changelog.css">
</head>
<body>
<div class="page-container">

  <!-- ═══ Top Bar ═══ -->
  <div class="top-bar">
    <div class="top-bar-left">
      <span class="top-bar-brand">App 投放 · 变更日志</span>
      <span class="top-bar-sub">Google Ads Change History</span>
    </div>
    <div class="top-bar-right">
      <span class="data-tag data-tag-real" id="data-tag">REAL DATA</span>
      <span class="top-bar-sub" id="date-range-label">数据周期: --</span>
    </div>
  </div>

  <!-- ═══ KPI Grid ═══ -->
  <div id="changelog-kpis" class="kpi-grid kpi-grid-5"></div>

  <!-- ═══ Filter + Table Card ═══ -->
  <div class="card">
    <div class="card-header" style="display:flex;flex-direction:column;gap:8px;">
      <div style="display:flex;gap:10px;align-items:center;flex-wrap:wrap;">
        <h3 style="margin:0;">变更记录</h3>
        <select id="cl-filter-camp" class="camp-select" style="max-width:220px;">
          <option value="all">全部 Campaign</option>
        </select>
        <select id="cl-filter-type" class="camp-select" style="max-width:180px;">
          <option value="all">全部实体</option>
          <option value="Campaign">Campaign</option>
          <option value="广告组">广告组</option>
          <option value="关键词">关键词</option>
          <option value="广告">广告</option>
          <option value="预算">预算</option>
          <option value="Campaign否定词">所有排除项</option>
          <option value="neg-kw">↳ 否定关键词</option>
          <option value="neg-app-cat">↳ 排除App类别</option>
          <option value="neg-content">↳ 排除内容标签</option>
          <option value="neg-placement">↳ 排除展示位置</option>
          <option value="neg-other">↳ 其他排除</option>
        </select>
        <select id="cl-filter-op" class="camp-select" style="max-width:130px;">
          <option value="all">全部操作</option>
          <option value="新建">新建</option>
          <option value="修改">修改</option>
          <option value="移除">移除</option>
        </select>
      </div>
      <div style="display:flex;gap:10px;align-items:center;flex-wrap:wrap;">
        <span style="font-size:12px;color:#6b7280;">日期范围</span>
        <input type="date" id="cl-filter-date-start" class="camp-select" style="max-width:160px;" title="开始日期">
        <span style="font-size:12px;color:#6b7280;">至</span>
        <input type="date" id="cl-filter-date-end" class="camp-select" style="max-width:160px;" title="结束日期">
        <input type="text" id="cl-search" class="search-input" placeholder="搜索 Campaign / 广告组 / 操作人..." style="max-width:280px;margin-left:auto;">
      </div>
    </div>
    <div class="card-body-flush table-wrap" style="max-height:calc(100vh - 300px);overflow-y:auto;">
      <table>
        <thead><tr>
          <th style="min-width:140px;">时间</th>
          <th>操作人</th>
          <th>来源</th>
          <th>Campaign</th>
          <th>广告组</th>
          <th>实体类型</th>
          <th>操作</th>
          <th style="min-width:300px;">变更内容</th>
        </tr></thead>
        <tbody id="changelog-tbody"></tbody>
      </table>
    </div>
    <div class="result-count" id="result-count"></div>
  </div>

</div>

<script src="js/adw_data_app_changelog.js"></script>
<script src="js/app-changelog.js"></script>
</body>
</html>
